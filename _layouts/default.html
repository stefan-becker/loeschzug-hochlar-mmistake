<html lang="{{ page.lang | default: site.lang | default: 'de-DE' }}" class="no-js">
<meta http-equiv="Content-Security-Policy"
      content="
default-src 'self';
script-src 'self' https://code.jquery.com
  'sha256-3g1LqjxBsnHDZDBClfZSiNNDtd7ZmWOaGxnG1WReEe4='
  'sha256-T0gtsIXRTceJOOQO3DXQFrLjuoFretgUZit1WyYnwg0='
  'sha256-LyJwunNyGIj7nYQyVINDFtObz1aXFMmPN1p0WWoyVVE=';
style-src 'self' https://fonts.googleapis.com;
font-src 'self' https://fonts.gstatic.com;
img-src 'self' data:;
connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com;
base-uri 'self';
form-action 'self';
object-src 'none';
frame-ancestors 'none';
upgrade-insecure-requests
">
  {% include head.html %}
  {% include scripts.html %}

  <body class="layout--{{ page.layout | default: layout.layout }}{% if page.classes or layout.classes %}{{ page.classes | default: layout.classes | join: ' ' | prepend: ' ' }}{% endif %} {% if page.entries_layout == 'grid' %}page--wide{% endif %} {{ page.title | slugify }}">
    {% include skip-links.html %}
    {% include navigation.html %}
    {% include masthead.html %}

    {{ content }}

    {% include footer.html %}
    
  </body>

</html>
